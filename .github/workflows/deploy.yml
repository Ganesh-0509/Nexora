name: CD — Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_migration:
        description: "Skip DB migration"
        type: boolean
        default: false

jobs:
  # ── 1. Apply Database Migrations ────────────────────────
  migrate:
    name: Apply DB Migrations
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_migration }}
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: nexora/package-lock.json

      - name: Install deps
        run: npm ci --legacy-peer-deps
        working-directory: nexora

      - name: Run migrations
        run: npx prisma migrate deploy
        working-directory: nexora
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── 2. Deploy to Vercel ──────────────────────────────────
  deploy-vercel:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: migrate
    environment:
      name: production
      url: https://nexora.app
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: nexora
          vercel-args: "--prod"

  # ── 3. Notify on Success / Failure ──────────────────────
  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [migrate, deploy-vercel]
    if: always()
    steps:
      - name: Notify success
        if: ${{ needs.deploy-vercel.result == 'success' }}
        run: echo "✅ Nexora deployed to production successfully."

      - name: Notify failure
        if: ${{ needs.deploy-vercel.result == 'failure' }}
        run: |
          echo "❌ Production deployment failed."
          exit 1
